name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test:run
      - run: pnpm typecheck
      - run: pnpm build

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

  package:
    if: github.event_name != 'pull_request'
    needs: [frontend, rust]
    name: package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            binary: tunneldesk
            experimental: false
          - name: linux-x86
            os: ubuntu-22.04
            target: i686-unknown-linux-gnu
            bundles: deb
            binary: tunneldesk
            experimental: true
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            binary: tunneldesk
            experimental: false
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            binary: tunneldesk
            experimental: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libfuse2

      - name: Install Linux tray dependencies
        if: matrix.name == 'linux-x64'
        run: sudo apt-get install -y libappindicator3-dev

      - name: Install Linux x86 dependencies
        if: matrix.name == 'linux-x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib pkg-config libwebkit2gtk-4.1-dev:i386 librsvg2-dev:i386
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci

      - name: Upload portable executable
        uses: actions/upload-artifact@v7
        with:
          name: tunneldesk-${{ matrix.name }}-portable
          if-no-files-found: error
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tunneldesk-${{ matrix.name }}-installer
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
