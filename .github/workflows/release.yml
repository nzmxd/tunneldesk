name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      CARGO_NET_RETRY: 10
      CARGO_HTTP_MULTIPLEXING: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            binary: tunneldesk
            experimental: false
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
            binary: tunneldesk
            experimental: false
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
            binary: tunneldesk
            experimental: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libfuse2

      - name: Install Linux tray dependencies
        if: matrix.name == 'linux-x64'
        run: sudo apt-get install -y libappindicator3-dev

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Fetch Rust dependencies
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 4; $attempt++) {
            cargo fetch --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq 4) {
              exit $LASTEXITCODE
            }

            Start-Sleep -Seconds (15 * $attempt)
          }

      - run: pnpm install --frozen-lockfile

      - name: Validate updater signing key
        shell: pwsh
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required to build signed updater artifacts."
          }

      - name: Build Tauri bundle
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci

      - name: Upload portable executable
        uses: actions/upload-artifact@v7
        with:
          name: tunneldesk-${{ matrix.name }}-portable
          if-no-files-found: error
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tunneldesk-${{ matrix.name }}-installer
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig

  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Prepare release assets
        shell: bash
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p release-assets
          version="${GITHUB_REF_NAME}"

          while IFS= read -r -d '' artifact_dir; do
            artifact="$(basename "$artifact_dir")"
            platform="${artifact#tunneldesk-}"

            case "$artifact" in
              tunneldesk-*-portable)
                platform="${platform%-portable}"
                mapfile -d '' portable_files < <(find "$artifact_dir" -type f -print0)

                if [ "${#portable_files[@]}" -ne 1 ]; then
                  echo "::error::Expected one portable executable in $artifact_dir, found ${#portable_files[@]}"
                  exit 1
                fi

                stage_dir="$(mktemp -d)"
                if [[ "$platform" == windows-* ]]; then
                  cp "${portable_files[0]}" "$stage_dir/tunneldesk.exe"
                  (cd "$stage_dir" && python3 -m zipfile -c "$GITHUB_WORKSPACE/release-assets/tunneldesk-${version}-${platform}-portable.zip" tunneldesk.exe)
                else
                  cp "${portable_files[0]}" "$stage_dir/tunneldesk"
                  chmod 755 "$stage_dir/tunneldesk"
                  tar -czf "release-assets/tunneldesk-${version}-${platform}-portable.tar.gz" -C "$stage_dir" tunneldesk
                fi
                rm -rf "$stage_dir"
                ;;

              tunneldesk-*-installer)
                platform="${platform%-installer}"

                while IFS= read -r -d '' file; do
                  base="$(basename "$file")"
                  lower="${base,,}"

                  case "$lower" in
                    *.exe) asset="tunneldesk-${version}-${platform}-setup.exe" ;;
                    *.msi) asset="tunneldesk-${version}-${platform}-setup.msi" ;;
                    *.deb) asset="tunneldesk-${version}-${platform}.deb" ;;
                    *.appimage) asset="tunneldesk-${version}-${platform}.AppImage" ;;
                    *.dmg) asset="tunneldesk-${version}-${platform}.dmg" ;;
                    *.rpm) asset="tunneldesk-${version}-${platform}.rpm" ;;
                    *.tar.gz) asset="tunneldesk-${version}-${platform}.tar.gz" ;;
                    *.sig)
                      signed="${base%.sig}"
                      signed_lower="${signed,,}"
                      case "$signed_lower" in
                        *.exe) asset="tunneldesk-${version}-${platform}-setup.exe.sig" ;;
                        *.msi) asset="tunneldesk-${version}-${platform}-setup.msi.sig" ;;
                        *.deb) asset="tunneldesk-${version}-${platform}.deb.sig" ;;
                        *.rpm) asset="tunneldesk-${version}-${platform}.rpm.sig" ;;
                        *.appimage) asset="tunneldesk-${version}-${platform}.AppImage.sig" ;;
                        *.tar.gz) asset="tunneldesk-${version}-${platform}.tar.gz.sig" ;;
                        *)
                          echo "Skipping unmatched signature file: $file"
                          continue
                          ;;
                      esac
                      ;;
                    *)
                      echo "Skipping non-installer file: $file"
                      continue
                      ;;
                  esac

                  cp "$file" "release-assets/$asset"
                done < <(find "$artifact_dir" -type f -print0)
                ;;
            esac
          done < <(find dist-artifacts -mindepth 1 -maxdepth 1 -type d -print0)

          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          assets_dir = Path("release-assets")
          tag = os.environ["GITHUB_REF_NAME"]
          repo = os.environ["GITHUB_REPOSITORY"]
          expected = {
              "windows-x64-nsis": ("windows-x86_64-nsis", f"tunneldesk-{tag}-windows-x64-setup.exe"),
              "windows-x64": ("windows-x86_64", f"tunneldesk-{tag}-windows-x64-setup.exe"),
              "windows-arm64-nsis": ("windows-aarch64-nsis", f"tunneldesk-{tag}-windows-arm64-setup.exe"),
              "windows-arm64": ("windows-aarch64", f"tunneldesk-{tag}-windows-arm64-setup.exe"),
              "linux-x64-deb": ("linux-x86_64-deb", f"tunneldesk-{tag}-linux-x64.deb"),
              "linux-x64-appimage": ("linux-x86_64-appimage", f"tunneldesk-{tag}-linux-x64.AppImage"),
              "linux-x64": ("linux-x86_64", f"tunneldesk-{tag}-linux-x64.AppImage"),
              "macos-x64-app": ("darwin-x86_64-app", f"tunneldesk-{tag}-macos-x64.tar.gz"),
              "macos-x64": ("darwin-x86_64", f"tunneldesk-{tag}-macos-x64.tar.gz"),
              "macos-arm64-app": ("darwin-aarch64-app", f"tunneldesk-{tag}-macos-arm64.tar.gz"),
              "macos-arm64": ("darwin-aarch64", f"tunneldesk-{tag}-macos-arm64.tar.gz"),
          }
          platforms = {}
          incomplete = []

          for label, (target, asset_name) in expected.items():
              asset = assets_dir / asset_name
              signature = assets_dir / f"{asset_name}.sig"
              if asset.exists() and signature.exists():
                  platforms[target] = {
                      "signature": signature.read_text(encoding="utf-8").strip(),
                      "url": f"https://github.com/{repo}/releases/download/{tag}/{asset.name}",
                  }
              elif asset.exists() or signature.exists():
                  incomplete.append(label)

          if incomplete:
              raise SystemExit(f"Incomplete updater assets for: {', '.join(incomplete)}")
          if not platforms:
              raise SystemExit("No signed updater assets were found")

          latest = {
              "version": tag,
              "notes": "See the GitHub release notes for this version.",
              "pub_date": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "platforms": platforms,
          }
          (assets_dir / "latest.json").write_text(
              json.dumps(latest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

          test -n "$(find release-assets -type f -print -quit)"

      - name: Remove previous release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          status="$(curl -sS -o release.json -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME")"

          if [ "$status" = "404" ]; then
            echo "No existing release assets to remove for $GITHUB_REF_NAME"
            exit 0
          fi

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            cat release.json
            echo "::error::Failed to fetch existing release assets: HTTP $status"
            exit 1
          fi

          release_id="$(python3 - <<'PY'
          import json

          with open("release.json", encoding="utf-8") as release_file:
              release = json.load(release_file)

          print(release["id"])
          PY
          )"

          page=1
          : > asset-ids.txt
          while :; do
            curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100&page=$page" \
              -o "assets-page-$page.json"

            count="$(python3 - "$page" <<'PY'
          import json
          import sys

          page = sys.argv[1]

          with open(f"assets-page-{page}.json", encoding="utf-8") as assets_file:
              assets = json.load(assets_file)

          with open("asset-ids.txt", "a", encoding="utf-8") as asset_ids_file:
              for asset in assets:
                  print(asset["id"], file=asset_ids_file)

          print(len(assets))
          PY
          )"

            [ "$count" != "0" ] || break
            page="$((page + 1))"
          done

          while IFS= read -r asset_id; do
            [ -n "$asset_id" ] || continue
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
          done < asset-ids.txt

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ github.ref_name }}
          name: TunnelDesk ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
