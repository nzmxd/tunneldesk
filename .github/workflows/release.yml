name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            binary: tunneldesk.exe
            experimental: false
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage
            binary: tunneldesk
            experimental: false
          - name: macos-x64
            os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
            binary: tunneldesk
            experimental: false
          - name: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            binary: tunneldesk
            experimental: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.name, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libfuse2

      - name: Install Linux tray dependencies
        if: matrix.name == 'linux-x64'
        run: sudo apt-get install -y libappindicator3-dev

      - name: Install Linux x86 dependencies
        if: matrix.name == 'linux-x86'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib pkg-config libwebkit2gtk-4.1-dev:i386 librsvg2-dev:i386
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_LIBDIR=/usr/lib/i386-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --ci

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tunneldesk-${{ matrix.name }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/${{ matrix.binary }}
            src-tauri/target/${{ matrix.target }}/release/bundle/**

  publish:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          while IFS= read -r -d '' file; do
            relative="${file#dist-artifacts/}"
            artifact="${relative%%/*}"
            base="$(basename "$file")"
            cp "$file" "release-assets/${artifact}-${base}"
          done < <(find dist-artifacts -type f -print0)
          test -n "$(find release-assets -type f -print -quit)"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ github.ref_name }}
          name: TunnelDesk ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
